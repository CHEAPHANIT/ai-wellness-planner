services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-meal-postgres
    environment:
      POSTGRES_DB: ai_meal_planning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_meal_planning"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ai-meal-backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ai_meal_planning
      SECRET_KEY: replace-with-a-long-random-secret
      BACKEND_CORS_ORIGINS: http://localhost:8080,http://localhost:5173,http://localhost:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        API_BASE_URL: http://localhost:8000
    container_name: ai-meal-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres-data:
